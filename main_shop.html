<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="main_page">
        <div class="header">
            <div class="logo">
                <img src="https://avatars.mds.yandex.net/i?id=228623241419d3e943677e8049ba92f9_l-10803820-images-thumbs&n=13" alt="" srcset="">
            </div>
            <div class="search">
                <input type="text" id="search-input" class="search-input" placeholder="Search...">
            </div>
            <div class="cart">
                <button type="button" class="btn" id="btn"></button>
            </div>
            <div class="signin">
                <button type="button" class="btn" id="btn"></button>
            </div>

        </div>

        <div class="tovar">
            <div class="filters">
                <div class="sortbyprice">
                    <h1>Price</h1>
                    <input class="sortOT" type="number" min="13199" max="799999" placeholder="от 13 199">
                    <input class="sortDO" type="number" min="13199" max="799999" placeholder="до 799 999">
                </div>
                <div class="sortbyrate">
                    <h1>Rating</h1>
                    <input class="sortOT1" type="number" min="0" max="5" placeholder="от 0.0">
                    <input class="sortDO1" type="number" min="0" max="5" placeholder="до 5.0">
                </div>
                
                <div class="primenit">
                    <button type="button" class="primenit_btn" id="primenit_btn">Continue</button>
                </div>
            </div>
            <div class="main_tovar">

            </div>
        </div>


    </div>









<script src="js/main.js"></script>
</body>
</html>
