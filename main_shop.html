<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphics Cards</title>
    <link rel="icon" type="" href="https://avatars.mds.yandex.net/i?id=228623241419d3e943677e8049ba92f9_l-10803820-images-thumbs&n=13">
    <link rel="stylesheet" href="css/main.css">
    
<body>
    <div class="main_page">
        <div class="header">
            <div class="logo">
                <img src="https://avatars.mds.yandex.net/i?id=228623241419d3e943677e8049ba92f9_l-10803820-images-thumbs&n=13" alt="" srcset="">
            </div>
            <div class="search">
                <input type="text" id="search-input" class="search-input" placeholder="Search...">
            </div>
            <div class="cart">
                <button type="button" class="cartbtn" data-bs-toggle="dropdown" aria-expanded="false" id="btn"></button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Действие</a></li>
                    <li><a class="dropdown-item" href="#">Другое действие</a></li>
                    <li><a class="dropdown-item" href="#">Что-то еще здесь</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#">Отделенна ссылка</a></li>
                  </ul>
            </div>
            
            <div class="signin">
                <button type="button" class="btn" id="btn" onclick="location.href='login.html'"></button>
            </div>

        </div>

        <div class="tovar">
            <div class="filters">
                <div class="sortbytype">
                    <h1>Type</h1>
                    <div class="custom-select">
                        <select name="forma" onchange="location = this.value;">
                            <option value="main_shop.html" selected >Graphics Cards</option>
                            <option value="main_shop_motherboards.html">Motherboards</option>
                            <option value="main_shop_cpu.html">CPUs</option>
                            <option value="main_shop_ram.html">RAMs</option>
                        </select>
                        <div class="select-arrow"></div>
                    </div>
                </div>
                <div class="sortbyprice">
                    <h1>Price</h1>
                    <input class="sortOT" type="number" min="13199" max="799999" placeholder="от 13 199">
                    <input class="sortDO" type="number" min="13199" max="799999" placeholder="до 799 999">
                </div>
                <div class="sortbyrate">
                    <h1>Rating</h1>
                    <input class="sortOT1" type="number" min="0" max="5" placeholder="от 0.0">
                    <input class="sortDO1" type="number" min="0" max="5" placeholder="до 5.0">
                </div>
                    <div class="sortbybrand">
                        <h1>Brand</h1>
                        <div class="custom-select">
                            <select name="formaa" onchange="">
                                <option value="">GIGABYTE</option>
                                <option value="">ASUS</option>
                                <option value="">PALIT</option>
                                <option value="">GAMEROCK</option>
                            </select>
                            <div class="select-arrow"></div>
                            </div>

                    
                    </div>
                
                <div class="primenit">
                    <button type="button" class="primenit_btn" id="primenit_btn">Continue</button>
                </div>
            </div>
            <div class="main_tovar">
            </div>
        </div>

        

    </div>


    <div class="modal hidden" id="confirmationModal">
        <div class="box">
            <div class="boxTitle">Are you sure?</div>
            <div class="buttons">
                <button class="button submitBtn">Yes</button>
                <button class="button cancelBtn">No</button>
            </div>
        </div>
    </div>












<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script src="js/main.js"></script>
</body>
</html>
